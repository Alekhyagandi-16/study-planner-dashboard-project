<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Smart Study Planner PRO+</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
margin:0;
font-family:'Poppins',sans-serif;
background:linear-gradient(-45deg,#667eea,#764ba2,#ff758c,#42e695);
background-size:400% 400%;
animation:bg 12s infinite;
color:white;
}
@keyframes bg{0%{background-position:0%}50%{background-position:100%}100%{background-position:0%}}

.login{display:flex;height:100vh;justify-content:center;align-items:center;}
.box{background:rgba(255,255,255,0.15);padding:30px;border-radius:20px;backdrop-filter:blur(15px);}

.dashboard{display:none;padding:20px;}

.card,.task{
background:rgba(255,255,255,0.15);
backdrop-filter:blur(15px);
border-radius:20px;
padding:15px;
margin:10px;
transition:.3s;
}
.card:hover,.task:hover{transform:translateY(-5px) scale(1.03);}

button{
padding:10px 15px;
border:none;
border-radius:25px;
background:linear-gradient(135deg,#00c6ff,#0072ff);
color:white;
cursor:pointer;
margin:5px;
}
button:hover{box-shadow:0 0 15px #00c6ff;transform:scale(1.1)}

.subBtn{background:white;color:black;}
.subBtn.active{background:#00e676;color:white;}

.progress{background:#ddd;border-radius:20px}
.fill{height:20px;background:#00e676;border-radius:20px;text-align:center}

.completed{text-decoration:line-through;opacity:.6}

.popup{
position:fixed;
bottom:20px;
right:20px;
background:#000;
padding:15px;
border-radius:15px;
display:none;
animation:fade 0.5s;
}
@keyframes fade{from{opacity:0}to{opacity:1}}

canvas{max-width:180px;margin:auto;display:block;}
</style>
</head>

<body>

<div class="login" id="loginPage">
<div class="box">
<h2>🚀 Smart Planner</h2>
<input id="name" placeholder="Enter name"><br><br>
<button onclick="login()">Start</button>
</div>
</div>

<div class="dashboard" id="dashboard">

<h2>📚 Study Planner</h2>

<div class="card">🏆 Score: <span id="score">0</span></div>
<div class="card">🔥 Streak: <span id="streak">0</span></div>

<div class="card">Tasks: <span id="total">0</span></div>
<div class="card">Done: <span id="done">0</span></div>

<div class="progress"><div id="progressBar" class="fill">0%</div></div>

<input id="task" placeholder="Task">
<input type="date" id="date">
<input type="time" id="time">

<div>
<button class="subBtn" onclick="setSubject(this,'DSA')">DSA</button>
<button class="subBtn" onclick="setSubject(this,'DBMS')">DBMS</button>
<button class="subBtn" onclick="setSubject(this,'OS')">OS</button>
<button class="subBtn" onclick="setSubject(this,'wt')">wt</button>
<button class="subBtn" onclick="setSubject(this,'Math')">Math</button>
</div>

<button onclick="add()">Add Task</button>

<h3>🧠 AI Suggestion</h3>
<div id="aiBox">Click below</div>
<button onclick="getSuggestion()">Suggest</button>

<div id="list"></div>

<h3>📊 Progress</h3>
<canvas id="chart"></canvas>

</div>

<div id="popup" class="popup"></div>

<script>
let tasks=JSON.parse(localStorage.getItem("tasks"))||[];
let selectedSubject="";
let chart=null;
let score=parseInt(localStorage.getItem("score"))||0;
let streak=parseInt(localStorage.getItem("streak"))||0;
<button onclick="exportData()">☁ Backup</button>
<button onclick="importData()">📥 Restore</button>


function login(){
if(name.value===""){alert("Enter name");return;}
Notification.requestPermission();
loginPage.style.display="none";
dashboard.style.display="block";
updateStreak();
render();
}

function setSubject(btn,sub){
document.querySelectorAll(".subBtn").forEach(b=>b.classList.remove("active"));
btn.classList.add("active");
selectedSubject=sub;
}

function add(){
if(task.value===""||selectedSubject===""){alert("Fill all");return;}

tasks.unshift({
id:Date.now(),
text:task.value,
subject:selectedSubject,
date:date.value,
time:time.value,
done:false,
notified:false
});

localStorage.setItem("tasks",JSON.stringify(tasks));
task.value="";
render();
}

function render(){
list.innerHTML="";
tasks.forEach(t=>{
let div=document.createElement("div");
div.className="task";
if(t.done) div.classList.add("completed");

div.innerHTML=`
✨ ${t.text} (${t.subject})<br>
<button onclick="toggle(${t.id})">✔</button>
<button onclick="del(${t.id})">🗑</button>
`;
list.appendChild(div);
});
updateStats();
drawChart();
}

function toggle(id){
tasks=tasks.map(t=>{
if(t.id===id){
if(!t.done){score+=10;}
t.done=!t.done;
}
return t;
});

localStorage.setItem("tasks",JSON.stringify(tasks));
localStorage.setItem("score",score);
render();
}

function del(id){
tasks=tasks.filter(t=>t.id!==id);
localStorage.setItem("tasks",JSON.stringify(tasks));
render();
}

function updateStats(){
let total=tasks.length;
let done=tasks.filter(t=>t.done).length;

document.getElementById("total").innerText=total;
document.getElementById("done").innerText=done;
document.getElementById("score").innerText=score;

let percent=total?Math.round(done/total*100):0;
progressBar.style.width=percent+"%";
progressBar.innerText=percent+"%";
}

function updateStreak(){
let today=new Date().toDateString();
if(localStorage.getItem("last")!==today){
streak++;
localStorage.setItem("last",today);
localStorage.setItem("streak",streak);
}
document.getElementById("streak").innerText=streak;
}

function drawChart(){
let done=tasks.filter(t=>t.done).length;
let pending=tasks.length-done;

if(chart) chart.destroy();

chart=new Chart(document.getElementById("chart"),{
type:'doughnut',
data:{
labels:["Done","Pending"],
datasets:[{
data:[done,pending],
backgroundColor:["#00e676","#ff5252"],
borderWidth:0
}]
},
options:{
plugins:{legend:{display:false}},
cutout:"80%"
}
});
}

function getSuggestion(){
let p=tasks.filter(t=>!t.done);
if(p.length===0){aiBox.innerText="🎉 All done!";return;}
aiBox.innerText="👉 Study: "+p[0].text;
}

function showPopup(msg){
let p=document.getElementById("popup");
p.innerText=msg;
p.style.display="block";
setTimeout(()=>p.style.display="none",4000);
}

function checkReminders(){
let now=new Date();

tasks.forEach(t=>{
if(t.date && t.time && !t.done){
let taskTime=new Date(t.date+"T"+t.time);
let diff=(taskTime-now)/1000;

if(diff>0 && diff<60 && !t.notified){
showPopup("📚 Time to: "+t.text);
new Notification("Reminder",{body:t.text});
t.notified=true;
}
}
});
}
setInterval(checkReminders,30000);

function exportData(){
let data=JSON.stringify(tasks);
navigator.clipboard.writeText(data);
alert("Copied backup to clipboard ☁");
}

function importData(){
let data=prompt("Paste backup data");
if(data){
tasks=JSON.parse(data);
localStorage.setItem("tasks",JSON.stringify(tasks));
render();
}
}

render();
</script>

</body>
</html>
